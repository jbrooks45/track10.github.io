<!DOCTYPE html>

  <header class="site-header">
    <a class="logo" href="index.html">Beat Archive</a>
    <button class="menu-toggle" id="menu-toggle" aria-label="Open navigation menu">☰</button>
    <nav id="main-nav">
      <a href="index.html">Home</a>
      <a href="beats.html">Beats</a>
      <a href="about.html">About</a>

  <main>
    <section class="page-title">
      <p class="eyebrow">Listen</p>
      <h1>Beat Gallery</h1>

      <article class="beat-card">
        <div class="cover-placeholder">
          <img src="images/boom bap.jpg" alt="Cover art for Beat One">

          <h2>dreamin wit dro</h2>

      <article class="beat-card">
        <div class="cover-placeholder">
          <img src="images/nothing more pic.jpg" alt="Cover art for Beat Two">
        </div>
        <div class="beat-info">
          <h2>nothing more</h2>
          <p>Chriss flip. Friend of mine. She's dope check her out.</p>
          <audio controls>
            <source src="audio/nothing more.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
          </audio>
        </div>
      </article>

      <article class="beat-card">
        <div class="cover-placeholder">
          <img src="images/t10 experiment.jpg" alt="Cover art for Beat Three">
        </div>
        <div class="beat-info">
          <h2>ftb</h2>
          <p>Robert Glasper flip that I did.</p>

            <source src="audio/ftb.mp3" type="audio/mpeg">
